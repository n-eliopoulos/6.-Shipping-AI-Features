		</div>
        <div id="error"></div>
	
    <script>
        $(function() {
            var html = $('html');
            // when the dom is ready, start with the player
            window.dcd_player = new DCDPlayer({
                init_url:	window.location.href,
                viewport_width: html.width(),
                viewport_height: html.height(),
                size_diff: 0
            });
            if (window.dcd_player) {
                window.dcd_player.launch();
            } else {
                // initialization failed !
                $('#error').html("There was an error in the intialization of the player, please try reopening the course again.");
                $('#sco').remove();
            }
        });
    </script>
